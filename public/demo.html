<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EmbedBot Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "DM Sans", Arial, sans-serif;
      color: #111;
      background: #ffffff;
      line-height: 1.5;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 16px 64px;
    }

    .back-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 40px;
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid #d8d8d8;
      background: rgba(255, 255, 255, 0.9);
      color: #111;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
      z-index: 9999;
    }

    .hero {
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 4vw, 2rem);
      line-height: 1.2;
    }

    p {
      margin: 10px 0 0;
      color: #444;
    }
  </style>
</head>
<body>
  <a class="back-btn" href="/" aria-label="Gaa tilbage">
    <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M15 6L9 12L15 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </a>
  <main class="wrap">
    <section class="hero">
      <h1>Sådan her kan din hjemmeside se ud på under 24 timer</h1>
      <p>
        Opsætning tager cirka 5 minutter. Chatbot demoen er klar i nederste højre hjørne.
      </p>
    </section>
  </main>

  <script
    src="https://embedbot1.vercel.app/widget.js?id=a2678b5f-6d8b-415f-bbc0-ef3ce2a148bc"
    data-name="EmbedBot"
    data-primary-color="#000000"
    data-secondary-color="#d9d9d9"
    data-fab-color="#000000"
    data-font="DM Sans">
  </script>
</body>
</html>
