<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EmbedBot Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "DM Sans", Arial, sans-serif;
      color: #111;
      background: #ffffff;
      line-height: 1.5;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 16px 64px;
    }

    .hero {
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 4vw, 2rem);
      line-height: 1.2;
    }

    p {
      margin: 10px 0 0;
      color: #444;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Sådan her kan din hjemmeside se ud på under 24 timer</h1>
      <p>
        Opsætning tager cirka 10 minutter. Chatbotten er klar i nederste højre hjørne.
      </p>
    </section>
  </main>

  <script
    src="https://embedbot1.vercel.app/widget.js?id=a2678b5f-6d8b-415f-bbc0-ef3ce2a148bc"
    data-name="EmbedBot"
    data-primary-color="#000000"
    data-secondary-color="#d9d9d9"
    data-fab-color="#000000"
    data-font="DM Sans">
  </script>
</body>
</html>
